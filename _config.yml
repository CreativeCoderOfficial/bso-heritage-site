##########

# collectionbuilder-sheets

# Jekyll Digital Collection Generator, designed for GitHub Pages

# https://github.com/CollectionBuilder/collectionbuilder-sheets

##########



##########

# URL VARIABLES

#

# GitHub Pages

url: https://CreativeCoderOfficial.github.io

baseurl: /bso-heritage-site

source-code: https://github.com/CollectionBuilder/collectionbuilder-sheets



##########

# SITE SETTINGS

#

# title of site appears in banner

title: BSO Heritage Website

# tagline, a short phrase that will appear throughout the site in the top banner

tagline: British Scouting Overseas Digital Archive

# description appears in meta tags and other locations

# this description might appear in search result lists, keep around 160 characters max

description: "Explore the history of British Scouting Overseas through groups, badges, documents, and newsletters from 1908 to present."

# creator of the digital collection, to appear in meta tags; we typically use our GitHub usernames but feel free to just use your name

author: BSO Heritage Team



##########

# COLLECTION SETTINGS

#

# Set the metadata for your collection 

# This will be the full URL to your CSV file or relative path + filename of CSV in this repository 

# e.g. relative path "/assets/demo-metadata.csv"

# e.g. published google sheet "https://docs.google.com/spreadsheets/d/e/2PACX-1vSn7AA-cbsXT3_nNUGftc1ab-CKXOJHMQCIENeR9NHElbyI9_qA99o0-HNZdG04v-M2_N21bUe_krQQ/pub?output=csv"

# e.g. on GitHub use the raw link "https://raw.githubusercontent.com/CollectionBuilder/collectionbuilder-sample-data/main/psychiana_cbdemo_gh.csv"

metadata-csv: https://docs.google.com/spreadsheets/d/e/2PACX-1vTZVkWtJGo7giHZS_NSEyc4mRwxxXYOS8Ksj0ANSC8DcZP5bVR0KeLZ3CUUH6vv8drombcRMVp69f-b/pub?gid=1179782383&single=true&output=csv



##########

# Site/Organization Branding 

# 

# BSO branding

organization-name: "British Scouting Overseas"

organization-link: https://bso.scouts.org.uk

# organization-logo-banner: [ADD WHEN AVAILABLE]

# organization-logo-nav: [ADD WHEN AVAILABLE]



##########

# ROBOTS EXCLUDE

#

# set noindex to true if you do NOT want Google to index your site

noindex: true



##########

# BUILD SETTINGS 

#

# Note: use environment variable on build command to include analytics

# JEKYLL_ENV=production jekyll build

# (this is done automatically by gh-pages build)

#

# dev mode turns on ability to change metadata

development-mode: true

# ignore stuff

exclude: [docs/, Rakefile, README.md, LICENSE]

# compress CSS output

sass:

  style: compressed

