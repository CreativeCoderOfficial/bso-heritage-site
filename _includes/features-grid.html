<!-- Features Section -->
<section class="features py-5">
    <div class="container">
        <div class="row g-4 justify-content-center">
            {% for feature in site.data.home-features %}
            <div class="col-lg-4 col-md-6">
                <div class="feature-card h-100 p-4 border rounded-3 d-flex flex-column">
                    <!-- Top Row: Icon + Badge -->
                    <div class="d-flex align-items-center mb-4">
                        <div class="feature-icon me-3">
                            <i class="bi {{ feature.icon }} fs-2 text-primary"></i>
                        </div>
                        <span class="badge bg-{{ feature.badge_color }} text-white px-3 py-2">
                            {{ feature.title }}
                        </span>
                    </div>
                    
                    <!-- Middle: Title + Description -->
                    <div class="flex-grow-1 mb-4">
                        <h3 class="h5 fw-bold text-dark mb-2">
                            {{ feature.title }}
                        </h3>
                        <p class="text-muted small mb-0">
                            {{ feature.description }}
                        </p>
                    </div>
                    
                    <!-- Bottom: CTA Button -->
                    <div class="mt-auto">
                        <a href="{{ feature.cta_link | relative_url }}" 
                           class="btn btn-primary w-100 d-flex align-items-center justify-content-center">
                            {{ feature.cta_text }}
                            <i class="bi bi-arrow-right ms-2"></i>
                        </a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</section>
