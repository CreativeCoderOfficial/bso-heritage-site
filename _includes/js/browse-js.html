{%- if site.data.theme.icons -%}{% assign icons = site.data.theme.icons %}{% else %}
{% assign cb_icons = site.pages | where: "name","cb-icons.svg" | first %}
{% assign icons = cb_icons.icons %}{%- endif -%}
{% assign fields = site.data.config-browse -%}
<script>

/* function to make each item card on page */
function makeCard(obj) {
    // find item link
    var itemHref;
    if (obj.article_url) {
      // Item has a rich article page — link there directly.
      // Normalize the path: strip leading slashes and prepend baseurl.
      itemHref = "{{ '/' | relative_url }}" + obj.article_url.replace(/^\/+/, '');
    } else if (obj.parentid) {
      itemHref = "{{ '/item.html' | relative_url | append: '?id=' }}" + obj.parentid + "#" + obj.objectid;
    } else {
      itemHref = "{{ '/item.html' | relative_url | append: '?id=' }}" + obj.objectid;
    }
    // find images
    var imgSrc, thumbSrc;
    // add images or thumb for objects based on format
    if(obj.youtubeid) {
      imgSrc = 'https://img.youtube.com/vi/' + obj.youtubeid + '/hqdefault.jpg';
    } else if (obj.format.includes("image")) {
      imgSrc = obj.filename.includes("/") ? obj.filename : "{{ '/objects/' | relative_url }}" + obj.filename;
    } else if (obj.format.includes("audio")) {
      thumbSrc = '{{ "/assets/lib/icons/" | relative_url }}{{ icons.icon-audio }}.svg';
    } else if (obj.format.includes("video")) {
      thumbSrc = '{{ "/assets/lib/icons/" | relative_url }}{{ icons.icon-video }}.svg';
    } else if (obj.format.includes("pdf")) {
      thumbSrc = '{{ "/assets/lib/icons/" | relative_url }}{{ icons.icon-pdf }}.svg';
    } else if (obj.format.includes("record")) {
        thumbSrc = '{{ "/assets/lib/icons/" | relative_url }}{{ icons.icon-record }}.svg';
    } else if (obj.format.includes("compound")) {
        thumbSrc = '{{ "/assets/lib/icons/" | relative_url }}{{ icons.icon-compound-object }}.svg';
    } else if (obj.format.includes("multiple")) {
        thumbSrc = '{{ "/assets/lib/icons/" | relative_url }}{{ icons.icon-multiple }}.svg';
    } else {
      thumbSrc = '{{ "/assets/lib/icons/" | relative_url }}{{ icons.icon-default }}.svg';
    }  
    // start card
    var card = '<div class="item col-lg-4 col-md-6 col-sm-12 mb-2"><div class="card">';
    // top image for photos
    if(imgSrc) {
      card += '<a href="' + itemHref + '"> <img class="card-img-top lazyload" data-src="' + imgSrc + '" alt="Image of ' + obj.title + '"></a>';
    }
    // title
    card += '<div class="card-body text-center"> <h4 class="card-title"><a href="' + itemHref + '" class="text-dark">' + obj.title + '</a></h4>';
    // thumb for non-photo items
    if(thumbSrc){
      card += '<p><a href="' + itemHref + '"><img class="lazyload w-50" data-src="' + thumbSrc + '" alt="Image of ' + obj.title + '"></a></p>';
    }
    // other fields
    card += '<p class="card-text">';
    {% for f in fields %}{% unless f.hidden == 'true' %}
    if(obj[{{ f.field | jsonify }}]){
    {% if f.display_name %}card += '<strong>{{ f.display_name }}:</strong> ';{% endif %}
    {% if f.btn == 'true' %}
    var btns = obj[{{ f.field | jsonify }}].split(";");
    for (var i = 0, len = btns.length; i < len; i++) {
      if(btns[i] != "") {
        card += '<a class="btn btn-sm btn-secondary m-1 text-wrap" href="' + window.location.pathname + '#' + encodeURIComponent(btns[i].trim()) + '">' + btns[i].trim() + '</a>';
      }
    }
    {% else %}
    card += obj[{{ f.field | jsonify }}];
    {% endif %}
    {% unless forloop.last %}card += '<br>';{% endunless %}
    }
    {% endunless %}{% endfor %}
    card += '</p>';
    // media type
    if(obj.format != "") {
      card += '<p class="card-text"><small><a class="btn btn-sm btn-outline-secondary" href="' + window.location.pathname + '#' + encodeURIComponent(obj.format) + '">' + 
      obj.format.split("/").pop().replace("_", " ").toUpperCase() + ' <svg class="bi icon-sprite"><use xlink:href="{{ "/assets/lib/cb-icons.svg" | relative_url }}#';
      if(obj.format.includes('image')){
          card += 'icon-image';
      } else if(obj.format.includes('audio')){
          card += 'icon-audio';
      } else if(obj.format.includes('video')){
          card += 'icon-video';
      } else if(obj.format.includes('multiple')){
          card += 'icon-multiple';
      } else if(obj.format.includes('compound')){
          card += 'icon-compound-object';
      } else {
          card += 'icon-default';
      }
      card += '"></span></a></small></p>';
    }
    // view button
    card += '<hr><a href="' + itemHref + '" class="btn btn-sm btn-light" title="link to ' + obj.title + '">View Full Record</a>';
    // close divs
    card += '</div></div></div>';
    // send back big string
    return card;
}

/* function to filter items to be displayed on browse */
function filterItems(arr, textQuery, fieldFilters, dateRange) {
  // show loading icon
  loadingIcon.classList.remove("d-none");
  
  // Build date range filter
  var dateFrom = dateRange ? dateRange.from : null;
  var dateTo = dateRange ? dateRange.to : null;
  
  // dont filter if no queries
  if (!textQuery && !fieldFilters && !dateFrom && !dateTo) {
    var filteredItems = arr;
  } else {
    // filter items
    var filteredItems = [];
    for (var i = 0, len = arr.length; i < len; i++) {
      var item = arr[i];
      var matches = true;
      
      // Check text search (OR logic across all fields)
      if (textQuery && textQuery.trim() !== "") {
          var val = "";
          if(item["title"]) { val += item["title"] + " "; }
          if(item["format"]) { val += item["format"] + " "; }
          {% for f in fields  %}
          if(item["{{ f.field }}"]) { val += item["{{ f.field }}"] + " "; }
          {% endfor %}
          
          if (val.toUpperCase().indexOf(textQuery.trim().toUpperCase()) === -1) {
              matches = false;
          }
      }
      
      // Check field filters (AND logic - all must match)
      if (matches && fieldFilters) {
          for (var fieldName in fieldFilters) {
              var expectedValue = fieldFilters[fieldName];
              if (item[fieldName] !== expectedValue) {
                  matches = false;
                  break;
              }
          }
      }
      
      // Check date range filter
      if (matches && (dateFrom || dateTo)) {
          var dateFields = ['date', 'date_founded', 'date_closed'];
          var hasValidDate = false;
          var itemMatchesDate = false;
          
          for (var k = 0; k < dateFields.length; k++) {
              var dateField = dateFields[k];
              if (item[dateField]) {
                  hasValidDate = true;
                  var itemDate = parseFlexibleDate(item[dateField]);
                  // If parsing failed, try direct Date constructor
                  if (itemDate === null) {
                      itemDate = new Date(item[dateField]);
                  }
                  
                  // Check from date
                  if (dateFrom && itemDate < dateFrom) {
                      continue;
                  }
                  
                  // Check to date  
                  if (dateTo) {
                      var toDatePlusOne = new Date(dateTo);
                      toDatePlusOne.setDate(toDatePlusOne.getDate() + 1);
                      if (itemDate > toDatePlusOne) {
                          continue;
                      }
                  }
                  
                  // If we get here, this date field passes
                  itemMatchesDate = true;
                  break;
              }
          }
          
          // If no valid date field found, exclude the item
          // OR if valid date fields exist but none matched the range
          if (!hasValidDate || !itemMatchesDate) {
              matches = false;
          }
      }
      
      // Add to results if matches all filters
      if (matches) {
        filteredItems.push(item);
      }
    }
  }
  
  // add number 
  document.querySelector("#numberOf").innerHTML = filteredItems.length + " of " + arr.length + " items";
  
  // add stuff, make cards first in giant var, then add all at once to speed things up
  var cards = "";
  for (var i = 0, len = filteredItems.length; i < len; i++) {
    cards += makeCard(filteredItems[i]);
  }
  browseItemsDiv.innerHTML = cards;
  
  // finish
  if (textQuery && textQuery !== "") {
      filterTextBox.focus();
  }
  loadingIcon.classList.add("d-none");
}

/* Fisher-Yates shuffle https://bost.ocks.org/mike/shuffle/ */
function shuffle(array) {
  var m = array.length, t, i;
  while (m) {
  i = Math.floor(Math.random() * m--);
  t = array[m];
  array[m] = array[i];
  array[i] = t;
  }
  return array;
}

/* init browse page */

/* set some elements */ 
var loadingIcon = document.querySelector("#loadingIcon");
var filterTextBox = document.querySelector('#filterTextBox');
var filterButton = document.querySelector("#filterButton");
var browseItemsDiv = document.querySelector("#browseItems");
var query = "";
var browse_items;

/* Global filter state */
var currentTextQuery = "";
var currentFieldFilters = {};
var currentDateRange = null;

/* function to init browse after loading items */ 
var browsePageInit = function (cb_items) {
  {% unless site.data.theme.browse-child-objects == true %}
  // filter compound objects
  var cb_items = cb_items.filter(item => !item.parentid);
  {% endunless %}
  
  // Store reference to items
  browse_items = cb_items;
  
  /* randomize items once at page load */
  shuffle(cb_items);
  
  /* filter if hash in initial URL */
  if(window.location.hash) { 
      var hashValue = decodeURIComponent(location.hash.substr(1));
      if (hashValue != 'maincontent') { 
          query = hashValue;
          currentTextQuery = hashValue;
      } else { 
          query = "";
      }
      filterTextBox.value = query;
      filterItems(cb_items, currentTextQuery, currentFieldFilters, currentDateRange);
  } else {
      query = "";
      filterItems(cb_items, currentTextQuery, currentFieldFilters, currentDateRange);
  }
}

// add feature function to includeFunctions array
includeFunctions.push(browsePageInit);

/* filter form */
function submitFilter() {
    currentTextQuery = filterTextBox.value;
    window.location.hash = encodeURIComponent(currentTextQuery);
    filterItems(browse_items, currentTextQuery, currentFieldFilters, currentDateRange);
}

/* reset filters */ 
function resetFilter() {
    // Clear text query
    currentTextQuery = "";
    filterTextBox.value = "";
    
    // Clear field filters
    currentFieldFilters = {};
    
    // Reset dropdowns
    var typeFilter = document.getElementById('typeFilter');
    if (typeFilter) typeFilter.value = "";
    
    var countryFilter = document.getElementById('countryFilter');
    if (countryFilter) countryFilter.value = "";
    
    var districtFilter = document.getElementById('districtFilter');
    if (districtFilter) districtFilter.value = "";
    
    // Clear date range
    currentDateRange = null;
    var dateFrom = document.getElementById('dateFrom');
    if (dateFrom) dateFrom.value = "";
    
    var dateTo = document.getElementById('dateTo');
    if (dateTo) dateTo.value = "";
    
    // Clear hash and re-filter
    window.location.hash = "";
    filterItems(browse_items, currentTextQuery, currentFieldFilters, currentDateRange);
}

/* filter if hash changes */ 
window.addEventListener("hashchange", function() {
    // read hash
    var hashValue = decodeURIComponent(location.hash.substr(1));
    if (hashValue != 'maincontent') { 
        currentTextQuery = hashValue;
        filterTextBox.value = hashValue;
        // filter with current field filters
        filterItems(browse_items, currentTextQuery, currentFieldFilters, currentDateRange);
    }
});

/* Apply all filters together */
function applyAllFilters() {
    // Get text search
    currentTextQuery = filterTextBox ? filterTextBox.value : "";
    
    // Get field filter values (only if selected, not "All...")
    currentFieldFilters = {};
    
    var typeFilter = document.getElementById('typeFilter');
    if (typeFilter && typeFilter.value && typeFilter.value !== "") {
        currentFieldFilters.type = typeFilter.value;
    }
    
    var countryFilter = document.getElementById('countryFilter');
    if (countryFilter && countryFilter.value && countryFilter.value !== "") {
        currentFieldFilters.country = countryFilter.value;
    }
    
    var districtFilter = document.getElementById('districtFilter');
    if (districtFilter && districtFilter.value && districtFilter.value !== "") {
        currentFieldFilters.district = districtFilter.value;
    }
    
    // Get date range
    var dateFromEl = document.getElementById('dateFrom');
    var dateToEl = document.getElementById('dateTo');
    
    if (dateFromEl || dateToEl) {
        var fromDate = dateFromEl && dateFromEl.value ? new Date(dateFromEl.value) : null;
        var toDate = dateToEl && dateToEl.value ? new Date(dateToEl.value) : null;
        
        currentDateRange = {
            from: fromDate,
            to: toDate
        };
    } else {
        currentDateRange = null;
    }
    
    // Re-filter with all current filters
    filterItems(browse_items, currentTextQuery, currentFieldFilters, currentDateRange);
}

/* Helper function to parse dates in multiple formats */
function parseFlexibleDate(dateStr) {
    if (!dateStr || typeof dateStr !== 'string') return null;
    
    // Remove any whitespace
    dateStr = dateStr.trim();
    
    // If it's just a year (4 digits), treat it as such
    if (/^\d{4}$/.test(dateStr)) {
        return new Date(parseInt(dateStr), 0, 1); // Jan 1 of that year
    }
    
    // Try DD/MM/YYYY format (common in Europe)
    if (/^\d{2}\/\d{2}\/\d{4}$/.test(dateStr)) {
        var parts = dateStr.split('/');
        // DD/MM/YYYY
        return new Date(parseInt(parts[2]), parseInt(parts[1]) - 1, parseInt(parts[0]));
    }
    
    // Try YYYY-MM-DD format (ISO)
    if (/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) {
        return new Date(dateStr);
    }
    
    // Try other ISO formats that Date.parse can handle
    var parsed = Date.parse(dateStr);
    if (!isNaN(parsed)) {
        return new Date(parsed);
    }
    
    return null; // Could not parse
}

/* Check if a field is a date field */
function isDateField(fieldName) {
    return fieldName === 'date' || fieldName === 'date_founded' || fieldName === 'date_closed';
}

/* item array sorting function */
function sorting(json_object, key_to_sort_by, sort_direction) {
    var direction = sort_direction || 'asc';
    function sortByKey(a, b) {
        var x = a[key_to_sort_by];
        var y = b[key_to_sort_by];
        
        // Handle date fields with flexible parsing
        if (isDateField(key_to_sort_by)) {
            if (typeof x === 'string') {
                x = parseFlexibleDate(x);
            }
            if (typeof y === 'string') {
                y = parseFlexibleDate(y);
            }
            // If parsing failed, fall back to string comparison
            if (x === null && y === null) {
                x = a[key_to_sort_by];
                y = b[key_to_sort_by];
            } else if (x === null) {
                x = a[key_to_sort_by];
            } else if (y === null) {
                y = b[key_to_sort_by];
            }
        }
        // For non-date string fields, use case-insensitive comparison
        else if (typeof x === 'string') { 
            x = x.toUpperCase(); 
        }
        else if (typeof y === 'string') { 
            y = y.toUpperCase(); 
        }
        
        var comparison = ((x==null) ? 1: (y==null) ? -1: (x < y) ? -1 : ((x > y) ? 1 : 0));
        return direction === 'desc' ? -comparison : comparison;
    }
    json_object.sort(sortByKey);
}

/* add sort function on click of sort options */
var sortFilter = document.querySelector("#sortFilter");
var sortOptions = document.querySelectorAll(".browse-sort-item");
sortOptions.forEach((button) => { 
  button.addEventListener("click", (event) => { 
    // get the sort field
    var field = button.dataset.filter; 
    var display_name = button.textContent.trim(); 
    // determine sort direction
    var sort_direction = 'asc';
    if (display_name === 'Newest') {
        sort_direction = 'desc';
    } else if (display_name === 'Oldest') {
        sort_direction = 'asc';
    }
    // switch active sort option
    sortOptions.forEach((option) => { option.classList.remove("active"); } );
    button.classList.add("active");
    sortFilter.innerHTML = display_name; 
    // send to sort and filter
    if (field != 'random') { 
        sorting(browse_items, field, sort_direction); 
        filterItems(browse_items, currentTextQuery, currentFieldFilters, currentDateRange); 
    } 
    else { 
        shuffle(browse_items); 
        filterItems(browse_items, currentTextQuery, currentFieldFilters, currentDateRange); 
    } 
  }); 
}); 

</script>
