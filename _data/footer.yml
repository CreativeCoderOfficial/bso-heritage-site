##########
# BSO Heritage Footer Configuration
##########

# Brand & Description (Column 1)
brand:
  title: "British Scouting Overseas Heritage"
  subtitle: "Since 1908"
  description: "Preserving and sharing the history of British Scouting Overseas through our digital archive of groups, badges, documents, and historical records."
  logo: "/assets/img/bso-logo.png"  # Update when available

# Social Media Links
social:
  - icon: "bi-facebook"
    url: "https://facebook.com"
    label: "Facebook"
  - icon: "bi-twitter-x"
    url: "https://twitter.com"
    label: "Twitter"
  - icon: "bi-instagram"
    url: "https://instagram.com"
    label: "Instagram"
  - icon: "bi-youtube"
    url: "https://youtube.com"
    label: "YouTube"

# Heritage Periods / Scouting Lineage (Column 2)
heritage_periods:
  title: "Scouting Lineage"
  links:
    - text: "UK Scouting"
      url: "/history/uk-scouting.html"
    - text: "BTIFC (1909-1952)"
      url: "/history/btifc.html"
    - text: "BSG (1947-1952)"
      url: "/history/bsg.html"
    - text: "BGA (1952-2013)"
      url: "/history/british-groups-abroad.html"
    - text: "BSWE (1952-2013)"
      url: "/history/bswe-germany-europe.html"
    - text: "BSO (2013-Present)"
      url: "/history/bso-2013-present.html"
      
# Guiding Periods (Column 3)
guiding_periods:
  title: "Guiding & Alternatives"
  links:
    - text: "UK Girl Guiding"
      url: "/history/uk-girl-guiding.html"
    - text: "BGIFC (1911-2017)"
      url: "/history/bgifc.html"
    - text: "BGO (2017-Present)"
      url: "/history/bgifc-bgo.html"
    - text: "Alternatives"
      url: "/history/alternatives.html"

# Resources (Column 4)
resources:
  title: "Resources"
  links:
    - text: "Group Directory"
      url: "/browse.html?filter=type%3AGroup"
    - text: "Badge Catalog"
      url: "/browse.html?filter=type%3ABadge"
    - text: "Publications Archive"
      url: "/browse.html?filter=type%3ADocument"
    - text: "Historical Documents"
      url: "/browse.html"
    - text: "Contribute or Support"
      url: "/about.html#contribute"

# Contact & Social (Column 5)
contact:
  title: "Stay Connected"
  email: "archive@bso.scouts.org.uk"
  external_links:
    - text: "Scouts UK"
      url: "https://www.scouts.org.uk"
      icon: "bi-box-arrow-up-right"
    - text: "British Scouting Overseas"
      url: "https://https://www.britishscoutingoverseas.org.uk"
      icon: "bi-box-arrow-up-right"

# Legal / Meta Row
legal:
  copyright: "&copy; {{ site.time | date: '%Y' }} British Scouting Overseas Heritage"
  links:
    - text: "Privacy Policy"
      url: "/about.html#privacy"
    - text: "Terms of Use"
      url: "/about.html#terms"
    - text: "Accessibility"
      url: "/about.html#accessibility"

external_official:
  title: "Official Scout Links:"
  links:
    - text: "Scouts UK"
      url: "https://www.scouts.org.uk"
    - text: "BSO"
      url: "https://https://www.britishscoutingoverseas.org.uk"

# Bottom Note
bottom_note:
  text: "Preserving scouting history for future generations"
  icon: "bi-heart-fill"
